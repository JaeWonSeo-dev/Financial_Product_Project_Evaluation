<!DOCTYPE html><html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>프로젝트 평가 상세</title><link rel="stylesheet" th:href="@{/css/app.css}"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head><body><div class="content"><section class="topbar"><div><h2 th:text="${project.name}"></h2><p class="muted" th:text="${project.description}"></p></div><div class="actions"><a class="btn secondary" href="/projects">목록</a><a class="btn" th:href="@{'/projects/' + ${project.id} + '/edit'}">수정</a><form th:action="@{'/projects/' + ${project.id}}" method="post"><input type="hidden" name="_method" value="delete"><button class="btn danger" type="submit">삭제</button></form></div></section><section class="card summary-strip"><div class="summary-item"><span>NPV</span><strong th:text="${evaluation.npv}"></strong></div><div class="summary-item"><span>IRR</span><strong th:text="${evaluation.irr + '%'}"></strong></div><div class="summary-item"><span>Payback</span><strong th:text="${evaluation.paybackPeriod > 0 ? evaluation.paybackPeriod + '년' : '미회수'}"></strong></div><div class="summary-item"><span>위험 점수</span><strong th:text="${evaluation.riskScore}"></strong></div><div class="summary-item"><span>VaR 스타일 손실</span><strong th:text="${evaluation.varEstimate}"></strong></div><div class="summary-item"><span>평가 등급</span><strong class="badge" th:classappend="${' grade-' + evaluation.grade.name()}" th:text="${evaluation.grade.label}"></strong></div></section><section class="split"><article class="card"><div class="section-header"><h3>시나리오 분석</h3></div><div class="table-wrap"><table><thead><tr><th>시나리오</th><th>NPV</th><th>IRR</th><th>Payback</th></tr></thead><tbody><tr th:each="s : ${evaluation.scenarios}"><td th:text="${s.scenario}"></td><td th:text="${s.npv}"></td><td th:text="${s.irr + '%'}"></td><td th:text="${s.paybackYears > 0 ? s.paybackYears + '년' : '미회수'}"></td></tr></tbody></table></div></article><article class="card"><div class="section-header"><h3>민감도 분석</h3></div><div class="chart-box"><canvas id="sensitivityChart"></canvas></div></article></section><section class="split"><article class="card"><div class="section-header"><h3>순현금흐름 차트</h3></div><div class="chart-box"><canvas id="cashFlowChart"></canvas></div></article><article class="card"><div class="section-header"><h3>현금흐름 표</h3></div><div class="table-wrap"><table><thead><tr><th>연차</th><th>유입</th><th>유출</th><th>순현금흐름</th></tr></thead><tbody><tr th:each="cf : ${project.cashFlows}"><td th:text="${cf.periodYear}"></td><td th:text="${cf.inflow}"></td><td th:text="${cf.outflow}"></td><td th:text="${cf.netCashFlow()}"></td></tr></tbody></table></div></article></section></div><script th:inline="javascript">const labels = /*[[${evaluation.sensitivities.![discountRate]}]]*/ []; const npvData = /*[[${evaluation.sensitivities.![npv]}]]*/ []; const cashFlowData = /*[[${evaluation.netCashFlows}]]*/ []; const cashLabels = cashFlowData.map((_, i) => `${i+1}년차`); new Chart(document.getElementById('sensitivityChart'), { type: 'line', data: { labels, datasets: [{ label:'NPV', data: npvData, borderColor:'#1f5eff' }] }, options: { responsive:true, maintainAspectRatio:false } }); new Chart(document.getElementById('cashFlowChart'), { type: 'bar', data: { labels: cashLabels, datasets: [{ label:'순현금흐름', data: cashFlowData, backgroundColor:'#0f9d58' }] }, options: { responsive:true, maintainAspectRatio:false } });</script></body></html>
