<!DOCTYPE html><html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>금융상품 상세</title><link rel="stylesheet" th:href="@{/css/app.css}"></head><body><div class="content"><section class="topbar"><div><h2 th:text="${product.name}"></h2><p class="muted" th:text="${product.description}"></p></div><div class="actions"><a class="btn secondary" href="/products">목록</a><a class="btn" th:href="@{'/products/' + ${product.id} + '/edit'}">수정</a><form th:action="@{'/products/' + ${product.id}}" method="post"><input type="hidden" name="_method" value="delete"><button class="btn danger" type="submit">삭제</button></form></div></section><section class="card summary-strip"><div class="summary-item"><span>상품 유형</span><strong th:text="${product.productType.label}"></strong></div><div class="summary-item"><span>투자금액</span><strong th:text="${#numbers.formatInteger(product.investmentAmount, 1, 'COMMA')}"></strong></div><div class="summary-item"><span>기대수익률</span><strong th:text="${product.expectedReturnRate + '%'}"></strong></div><div class="summary-item"><span>할인율</span><strong th:text="${product.discountRate + '%'}"></strong></div><div class="summary-item"><span>위험등급</span><strong th:text="${product.riskGrade.label}"></strong></div><div class="summary-item"><span>만기</span><strong th:text="${product.maturityMonths + '개월'}"></strong></div></section></div></body></html>
