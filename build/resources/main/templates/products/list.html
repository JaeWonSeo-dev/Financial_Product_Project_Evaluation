<!DOCTYPE html><html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>금융상품 관리</title><link rel="stylesheet" th:href="@{/css/app.css}"></head><body><div class="content"><section class="topbar"><div><h2>금융상품 관리</h2><p class="muted">채권, 대출, 펀드, 파생상품의 수익성과 위험속성을 관리합니다.</p></div><div class="actions"><a class="btn secondary" href="/">대시보드</a><a class="btn" href="/products/new">신규 등록</a></div></section><section class="card"><div th:if="${message}" class="flash" th:text="${message}"></div><div class="table-wrap"><table><thead><tr><th>상품명</th><th>유형</th><th>투자금액</th><th>수익률</th><th>할인율</th><th>위험등급</th><th></th></tr></thead><tbody><tr th:each="p : ${products}"><td th:text="${p.name}"></td><td th:text="${p.productType.label}"></td><td th:text="${#numbers.formatInteger(p.investmentAmount, 1, 'COMMA')}"></td><td th:text="${p.expectedReturnRate + '%'}"></td><td th:text="${p.discountRate + '%'}"></td><td><span class="badge" th:classappend="${' risk-' + p.riskGrade.name()}" th:text="${p.riskGrade.label}"></span></td><td class="actions"><a class="btn secondary" th:href="@{'/products/' + ${p.id}}">상세</a></td></tr></tbody></table></div></section></div></body></html>
