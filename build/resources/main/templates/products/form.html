<!DOCTYPE html><html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>금융상품 폼</title><link rel="stylesheet" th:href="@{/css/app.css}"></head><body><div class="content"><section class="topbar"><div><h2 th:text="${editMode} ? '금융상품 수정' : '금융상품 등록'"></h2></div><div class="actions"><a class="btn secondary" href="/products">목록</a></div></section><section class="card"><form class="form-grid" th:object="${product}" th:action="${editMode} ? @{'/products/' + ${productId}} : @{/products}" method="post"><input th:if="${editMode}" type="hidden" name="_method" value="put"><label>상품명<input th:field="*{name}"></label><label>상품유형<select th:field="*{productType}"><option th:each="t : ${productTypes}" th:value="${t}" th:text="${t.label}"></option></select></label><label>투자금액<input type="number" th:field="*{investmentAmount}" step="0.01"></label><label>기대수익률(%)<input type="number" th:field="*{expectedReturnRate}" step="0.01"></label><label>할인율(%)<input type="number" th:field="*{discountRate}" step="0.01"></label><label>만기(개월)<input type="number" th:field="*{maturityMonths}"></label><label>위험등급<select th:field="*{riskGrade}"><option th:each="r : ${riskGrades}" th:value="${r}" th:text="${r.label}"></option></select></label><label>변동성(%)<input type="number" th:field="*{annualVolatility}" step="0.01"></label><label class="full">발행기관<input th:field="*{issuer}"></label><label class="full">설명<textarea th:field="*{description}" rows="4"></textarea></label><div class="full footer-actions"><button class="btn" type="submit">저장</button></div></form></section></div></body></html>
