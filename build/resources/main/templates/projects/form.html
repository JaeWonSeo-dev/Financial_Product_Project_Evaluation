<!DOCTYPE html><html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>프로젝트 폼</title><link rel="stylesheet" th:href="@{/css/app.css}"></head><body><div class="content"><section class="topbar"><div><h2 th:text="${editMode} ? '프로젝트 수정' : '프로젝트 등록'"></h2></div><div class="actions"><a class="btn secondary" href="/projects">목록</a></div></section><section class="card"><form class="form-grid" th:object="${project}" th:action="${editMode} ? @{'/projects/' + ${projectId}} : @{/projects}" method="post"><input th:if="${editMode}" type="hidden" name="_method" value="put"><label>프로젝트명<input th:field="*{name}"></label><label>카테고리<input th:field="*{category}"></label><label>초기투자<input type="number" th:field="*{initialInvestment}" step="0.01"></label><label>할인율(%)<input type="number" th:field="*{discountRate}" step="0.01"></label><label>상태<select th:field="*{status}"><option th:each="s : ${projectStatuses}" th:value="${s}" th:text="${s.label}"></option></select></label><label>담당 조직<input th:field="*{owner}"></label><label>시작일<input type="date" th:field="*{startDate}"></label><label>종료일<input type="date" th:field="*{endDate}"></label><label class="full">설명<textarea th:field="*{description}" rows="3"></textarea></label><div class="full"><h3>현금흐름 입력</h3><div class="mini-grid" th:each="cf, stat : *{cashFlows}"><input type="number" th:field="*{cashFlows[__${stat.index}__].periodYear}" placeholder="연차"><input type="number" step="0.01" th:field="*{cashFlows[__${stat.index}__].inflow}" placeholder="유입"><input type="number" step="0.01" th:field="*{cashFlows[__${stat.index}__].outflow}" placeholder="유출"></div></div><div class="full footer-actions"><button class="btn" type="submit">저장</button></div></form></section></div></body></html>
