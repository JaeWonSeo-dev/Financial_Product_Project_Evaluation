<!DOCTYPE html><html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>프로젝트 평가 목록</title><link rel="stylesheet" th:href="@{/css/app.css}"></head><body><div class="content"><section class="topbar"><div><h2>프로젝트 평가</h2><p class="muted">현금흐름 기반 NPV, IRR, Payback Period를 계산합니다.</p></div><div class="actions"><a class="btn secondary" href="/">대시보드</a><a class="btn" href="/projects/new">신규 등록</a></div></section><section class="card"><div th:if="${message}" class="flash" th:text="${message}"></div><div class="table-wrap"><table><thead><tr><th>프로젝트명</th><th>카테고리</th><th>초기투자</th><th>할인율</th><th>상태</th><th></th></tr></thead><tbody><tr th:each="p : ${projects}"><td th:text="${p.name}"></td><td th:text="${p.category}"></td><td th:text="${#numbers.formatInteger(p.initialInvestment, 1, 'COMMA')}"></td><td th:text="${p.discountRate + '%'}"></td><td th:text="${p.status.label}"></td><td><a class="btn secondary" th:href="@{'/projects/' + ${p.id}}">평가 보기</a></td></tr></tbody></table></div></section></div></body></html>
